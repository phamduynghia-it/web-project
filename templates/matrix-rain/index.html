    <body>

        <style type="text/css">
            body {
                margin: 0;

                overflow: hidden;

            }

        <script type="text/javascript">
            /* ================= MATRIX BACKGROUND ================= */
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext("2d");
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;

            var texts = "__MATRIX_TEXT__".split("");  /* (config) */
            var fontSize = 16; 
            var columns = canvas.width / fontSize;
            var drops = [];
            for (var x = 0; x < columns; x++) drops[x] = 1;

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "__MATRIX_COLOR__";  /* (config) */
                ctx.font = fontSize + "px arial";

                for (var i = 0; i < drops.length; i++) {
                    var text = texts[Math.floor(Math.random() * texts.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (
                        drops[i] * fontSize > canvas.height ||
                        Math.random() > 0.95
                    )
                        drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        </script>

        <script>
            /* ================= COUNTDOWN PARTICLES ================= */
            var countdownParticles = [];
            var countdownTexts = __SENTENCES__;  /* (config) */

            var currentTextIndex = 0;
            var countdownStage = "idle"; // idle | forming | holding | dispersing
            var stableTime = 0; // biáº¿n Ä‘áº¿m thá»i gian
            
            // --- Cáº¤U HÃŒNH THá»œI GIAN á»ž ÄÃ‚Y ---  /* (config) */
            var STABLE_DURATION = __STABLE_DURATION__; // TÄƒng lÃªn 500 Ä‘á»ƒ chá»¯ giá»¯ nÃ©t lÃ¢u hÆ¡n (táº§m 8-9 giÃ¢y)
            var FORMING_SPEED = __FORMING_SPEED__; // TÄƒng tá»‘c Ä‘á»™ bay tá»« 0.1 lÃªn 0.35 Ä‘á»ƒ giáº£m thá»i gian bá»‹ vá»¡
            // -------------------------------

            var countdownHoldTime = 0;
            var countdownCtx = document
                .getElementById("countdownCanvas")
                .getContext("2d");

            var started = false;
            var pinkboardStarted = false;
            var particleSize = 3;
            var particleDensity = 6; // Giáº£m nháº¹ máº­t Ä‘á»™ Ä‘á»ƒ Ä‘á»¡ lag náº¿u mÃ¡y yáº¿u

            function initCountdownCanvas() {
                var canvas = document.getElementById("countdownCanvas");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createTextParticles(text) {
                countdownParticles = [];
                text = text.replace(/\s+\n/g, "\n");
                var lines = text.split("\n").map((s) => s.trim());

                var tempCanvas = document.createElement("canvas");
                var tempCtx = tempCanvas.getContext("2d");

                var maxAllowedWidth = window.innerWidth * 0.8;
                var fontSize = Math.min(window.innerWidth / 8, 220);
                tempCtx.font = `bold ${fontSize}px Arial`;

                function measure() {
                    return Math.max(
                        ...lines.map((l) => tempCtx.measureText(l).width),
                    );
                }
                while (measure() > maxAllowedWidth && fontSize > 18) {
                    fontSize *= 0.9;
                    tempCtx.font = `bold ${fontSize}px Arial`;
                }

                var lineHeight = fontSize * 1.2;
                tempCanvas.width = window.innerWidth;
                tempCanvas.height = lineHeight * lines.length + fontSize;

                tempCtx.font = `bold ${fontSize}px Arial`;
                tempCtx.fillStyle = "__TEXT_COLOR__";  /* (config) */
                tempCtx.textAlign = "center";
                tempCtx.textBaseline = "middle";
                tempCtx.shadowColor = "#800080";
                tempCtx.shadowBlur = 8;

                var startY =
                    tempCanvas.height / 2 -
                    ((lines.length - 1) * lineHeight) / 2;
                lines.forEach((l, i) => {
                    tempCtx.fillText(
                        l,
                        tempCanvas.width / 2,
                        startY + i * lineHeight,
                    );
                });

                var data = tempCtx.getImageData(
                    0,
                    0,
                    tempCanvas.width,
                    tempCanvas.height,
                ).data;
                for (var y = 0; y < tempCanvas.height; y += particleDensity) {
                    for (
                        var x = 0;
                        x < tempCanvas.width;
                        x += particleDensity
                    ) {
                        if (data[(y * tempCanvas.width + x) * 4 + 3] > 128) {
                            countdownParticles.push({
                                x: Math.random() * window.innerWidth, // Vá»‹ trÃ­ ban Ä‘áº§u ngáº«u nhiÃªn
                                y: Math.random() * window.innerHeight,
                                targetX:
                                    x -
                                    tempCanvas.width / 2 +
                                    window.innerWidth / 2,
                                targetY:
                                    y -
                                    tempCanvas.height / 2 +
                                    window.innerHeight / 2,
                                vx: 0,
                                vy: 0,
                                size: particleSize,
                            });
                        }
                    }
                }
            }

            function updateCountdownParticles() {
                if (!started) return;

                countdownCtx.clearRect(
                    0,
                    0,
                    window.innerWidth,
                    window.innerHeight,
                );
                var done = true;

                countdownParticles.forEach((p) => {
                    if (countdownStage === "forming") {
                        // TÄƒng tá»‘c Ä‘á»™ bay vá» Ä‘Ã­ch Ä‘á»ƒ giáº£m thá»i gian "vá»¡"
                        p.vx = (p.targetX - p.x) * FORMING_SPEED; 
                        p.vy = (p.targetY - p.y) * FORMING_SPEED;
                        
                        // Cáº­p nháº­t vá»‹ trÃ­
                        p.x += p.vx;
                        p.y += p.vy;

                        // Kiá»ƒm tra xem Ä‘Ã£ Ä‘áº¿n nÆ¡i chÆ°a (sai sá»‘ nhá» hÆ¡n 1px)
                        if (Math.abs(p.targetX - p.x) > 1 || Math.abs(p.targetY - p.y) > 1) {
                            done = false;
                        } else {
                            // Náº¿u Ä‘Ã£ ráº¥t gáº§n, gÃ¡n cá»©ng vá»‹ trÃ­ Ä‘á»ƒ chá»¯ sáº¯c nÃ©t
                            p.x = p.targetX;
                            p.y = p.targetY;
                        }
                    } else if (countdownStage === "stable") {
                        // Khi Ä‘Ã£ á»•n Ä‘á»‹nh, khÃ³a cá»©ng vá»‹ trÃ­ tuyá»‡t Ä‘á»‘i, khÃ´ng rung láº¯c
                        p.x = p.targetX;
                        p.y = p.targetY;
                    } 
                    // Giai Ä‘oáº¡n dispersing (tan rÃ£) náº¿u muá»‘n thÃªm hiá»‡u á»©ng ná»• thÃ¬ code á»Ÿ Ä‘Ã¢y
                    // Hiá»‡n táº¡i code cÅ© chá»‰ chuyá»ƒn text luÃ´n nÃªn ko cáº§n xá»­ lÃ½
                    
                    countdownCtx.beginPath();
                    countdownCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    countdownCtx.fillStyle = "__TEXT_COLOR__";
                    countdownCtx.fill();
                });

                if (countdownStage === "forming" && done) {
                    countdownStage = "stable"; // Chuyá»ƒn sang cháº¿ Ä‘á»™ giá»¯ nÃ©t
                    stableTime = 0;
                }

                if (countdownStage === "stable") {
                    stableTime++;
                    // Giá»¯ nguyÃªn tráº¡ng thÃ¡i nÃ y trong STABLE_DURATION frame
                    if (stableTime > STABLE_DURATION) {
                        countdownStage = "dispersing";
                    }
                }

                if (countdownStage === "dispersing") {
                    currentTextIndex++;
                    if (currentTextIndex < countdownTexts.length) {
                        createTextParticles(countdownTexts[currentTextIndex]);
                        countdownStage = "forming";
                    } else {
                        document.getElementById(
                            "countdownCanvas",
                        ).style.display = "none";
                        document.getElementById("child").style.display =
                            "block";
                        if (!pinkboardStarted) initPinkboard();
                        return;
                    }
                }
                requestAnimationFrame(updateCountdownParticles);
            }
        </script>

        <script>
            /* ================= CLICK START ================= */
            function startLove() {
                if (started) return;
                started = true;

                document.getElementById("tapHint").style.display = "none";

                initCountdownCanvas();
                createTextParticles(countdownTexts[0]);
                countdownStage = "forming";
                updateCountdownParticles();

                var audio = document.getElementById("bgMusic");
                audio.play().catch(() => {});
            }

            document.addEventListener("click", startLove);
            document.addEventListener("touchstart", startLove);
        </script>

        <script>
            function initPinkboard() {
                var settings = {
                    particles: {
                        length: 500,
                        duration: 2,
                        velocity: 100,
                        effect: -0.75,
                        size: 30,
                    },
                };

                var Point = (function () {
                    function Point(x, y) {
                        this.x = typeof x !== "undefined" ? x : 0;
                        this.y = typeof y !== "undefined" ? y : 0;
                    }
                    Point.prototype.clone = function () {
                        return new Point(this.x, this.y);
                    };
                    Point.prototype.length = function (length) {
                        if (typeof length == "undefined")
                            return Math.sqrt(this.x * this.x + this.y * this.y);
                        this.normalize();
                        this.x *= length;
                        this.y *= length;
                        return this;
                    };
                    Point.prototype.normalize = function () {
                        var length = this.length();
                        this.x /= length;
                        this.y /= length;
                        return this;
                    };
                    return Point;
                })();

                var Particle = (function () {
                    function Particle() {
                        this.position = new Point();
                        this.velocity = new Point();
                        this.acceleration = new Point();
                        this.age = 0;
                    }
                    Particle.prototype.initialize = function (x, y, dx, dy) {
                        this.position.x = x;
                        this.position.y = y;
                        this.velocity.x = dx;
                        this.velocity.y = dy;
                        this.acceleration.x = dx * settings.particles.effect;
                        this.acceleration.y = dy * settings.particles.effect;
                        this.age = 0;
                    };
                    Particle.prototype.update = function (deltaTime) {
                        this.position.x += this.velocity.x * deltaTime;
                        this.position.y += this.velocity.y * deltaTime;
                        this.velocity.x += this.acceleration.x * deltaTime;
                        this.velocity.y += this.acceleration.y * deltaTime;
                        this.age += deltaTime;
                    };
                    Particle.prototype.draw = function (context, image) {
                        function ease(t) {
                            return --t * t * t + 1;
                        }
                        var size =
                            image.width *
                            ease(this.age / settings.particles.duration);
                        context.globalAlpha =
                            1 - this.age / settings.particles.duration;
                        context.drawImage(
                            image,
                            this.position.x - size / 2,
                            this.position.y - size / 2,
                            size,
                            size,
                        );
                    };
                    return Particle;
                })();

                var ParticlePool = (function () {
                    var particles,
                        firstActive = 0,
                        firstFree = 0,
                        duration = settings.particles.duration;
                    function ParticlePool(length) {
                        particles = new Array(length);
                        for (var i = 0; i < particles.length; i++)
                            particles[i] = new Particle();
                    }
                    ParticlePool.prototype.add = function (x, y, dx, dy) {
                        particles[firstFree].initialize(x, y, dx, dy);
                        firstFree++;
                        if (firstFree == particles.length) firstFree = 0;
                        if (firstActive == firstFree) firstActive++;
                        if (firstActive == particles.length) firstActive = 0;
                    };
                    ParticlePool.prototype.update = function (deltaTime) {
                        var i;
                        if (firstActive < firstFree) {
                            for (i = firstActive; i < firstFree; i++)
                                particles[i].update(deltaTime);
                        }
                        if (firstFree < firstActive) {
                            for (i = firstActive; i < particles.length; i++)
                                particles[i].update(deltaTime);
                            for (i = 0; i < firstFree; i++)
                                particles[i].update(deltaTime);
                        }
                        while (
                            particles[firstActive].age >= duration &&
                            firstActive != firstFree
                        ) {
                            firstActive++;
                            if (firstActive == particles.length)
                                firstActive = 0;
                        }
                    };
                    ParticlePool.prototype.draw = function (context, image) {
                        if (firstActive < firstFree) {
                            for (i = firstActive; i < firstFree; i++)
                                particles[i].draw(context, image);
                        }
                        if (firstFree < firstActive) {
                            for (i = firstActive; i < particles.length; i++)
                                particles[i].draw(context, image);
                            for (i = 0; i < firstFree; i++)
                                particles[i].draw(context, image);
                        }
                    };
                    return ParticlePool;
                })();

                (function (canvas) {
                    var context = canvas.getContext("2d"),
                        particles = new ParticlePool(settings.particles.length),
                        particleRate =
                            settings.particles.length /
                            settings.particles.duration,
                        time;

                    function pointOnHeart(t) {
                        return new Point(
                            160 * Math.pow(Math.sin(t), 3),
                            130 * Math.cos(t) -
                                50 * Math.cos(2 * t) -
                                20 * Math.cos(3 * t) -
                                10 * Math.cos(4 * t) +
                                25,
                        );
                    }

                    var image = (function () {
                        var canvas = document.createElement("canvas"),
                            context = canvas.getContext("2d");
                        canvas.width = settings.particles.size;
                        canvas.height = settings.particles.size;
                        function to(t) {
                            var point = pointOnHeart(t);
                            point.x =
                                settings.particles.size / 2 +
                                (point.x * settings.particles.size) / 350;
                            point.y =
                                settings.particles.size / 2 -
                                (point.y * settings.particles.size) / 350;
                            return point;
                        }
                        context.beginPath();
                        var t = -Math.PI;
                        var point = to(t);
                        context.moveTo(point.x, point.y);
                        while (t < Math.PI) {
                            t += 0.01;
                            point = to(t);
                            context.lineTo(point.x, point.y);
                        }
                        context.closePath();
                        context.fillStyle = "#ea80b0";
                        context.fill();
                        var image = new Image();
                        image.src = canvas.toDataURL();
                        return image;
                    })();

                    function render() {
                        requestAnimationFrame(render);
                        var newTime = new Date().getTime() / 1000,
                            deltaTime = newTime - (time || newTime);
                        time = newTime;
                        context.clearRect(0, 0, canvas.width, canvas.height);
                        var amount = particleRate * deltaTime;
                        for (var i = 0; i < amount; i++) {
                            var pos = pointOnHeart(
                                Math.PI - 2 * Math.PI * Math.random(),
                            );
                            var dir = pos
                                .clone()
                                .length(settings.particles.velocity);
                            particles.add(
                                canvas.width / 2 + pos.x,
                                canvas.height / 2 - pos.y,
                                dir.x,
                                -dir.y,
                            );
                        }
                        particles.update(deltaTime);
                        particles.draw(context, image);
                    }

                    function onResize() {
                        canvas.width = canvas.clientWidth;
                        canvas.height = canvas.clientHeight;
                    }
                    window.onresize = onResize;
                    setTimeout(function () {
                        onResize();
                        render();
                    }, 10);
                })(document.getElementById("pinkboard"));
            }

            // å¯åŠ¨å€’è®¡æ—¶
            window.onload = function () {
                initCountdownCanvas();
                createTextParticles(countdownTexts[0]);
                updateCountdownParticles();
            };
        </script>
        <script>
            function initMusic() {
                var audio = document.getElementById("bgMusic");
                if (audio.paused) {
                    audio.play().catch((err) => {
                        console.log(
                            "Autoplay bá»‹ cháº·n, cáº§n user interaction:",
                            err,
                        );
                    });
                }
                // Sau khi play thÃ¬ bá» event Ä‘i Ä‘á»ƒ khÃ´ng gá»i láº¡i
                document.removeEventListener("click", initMusic);
                document.removeEventListener("touchstart", initMusic);
            }

            // Láº¯ng nghe sá»± kiá»‡n cháº¡m/click Ä‘áº§u tiÃªn
            document.addEventListener("click", initMusic);
            document.addEventListener("touchstart", initMusic);
        </script>
