  <!-- LOAD SETTINGS LOGIC -->
  <script>
    function initWithData(settings) {
      const music = settings.music;
      const popupMessage = settings.popupMessage;
      window._hasEnvelopeMessage = !!popupMessage;
      const messages = settings.messages;

      let noImage = false;
      let images = settings.images || settings.image;
      if (Array.isArray(images) && images.length === 0) {
        images = [];
        noImage = true;
      }
      
      const title = settings.title;
      const heartColor = settings.heartColor;

      window.dataChristmasTree = {
        template: "valentine-heart",
        data: {
          title: title,
          type_music: "link",
          music_id: music,
          backgroundMusic: music,
          popupMessage: popupMessage,
          messages: messages,
          images: images,
          heartColor: heartColor
        }
      };

      window.Heartlove = {
        data: {
          title: title,
          popupMessage: popupMessage,
          messages: messages,
          images: images,
          heartColor: heartColor,

        }
      };

      window.dataValentine = {
        data: {
          messages: messages,
          images: images,
          captions: [],

      const popupTitle = document.getElementById('popup-title');
      if (popupTitle && title) {
        popupTitle.innerHTML = title + '<span class="heart-icon">ðŸ’˜</span>';

      const popupImage = document.getElementById('popup-image');

        window._noImageFromApi = true;
      } else if (popupImage && images && images.length > 0) {
