  <!-- Chặn phím tắt mở DevTools & chuột phải -->
  <script>
    (function () {
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault();
      });

      document.addEventListener('keydown', function (e) {
        var key = (e.key || '').toLowerCase();
        var ctrl = e.ctrlKey || e.metaKey;

        if (e.keyCode === 123 || key === 'f12') {
          e.preventDefault();
          return;
        }

        if (ctrl && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) {
          e.preventDefault();
          return;
        }

        if (ctrl && (key === 'u' || key === 's')) {
          e.preventDefault();
          return;
        }
      });
    })();
  </script>

  <!-- Loading overlay styles (inline để hiển thị ngay lập tức, không phụ thuộc CSS bundle) -->
  <style>
    #heartlove-loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0512 0%, #0a0207 70%, #000 100%);
      font-family: 'Mali', system-ui, -apple-system, sans-serif;
      color: #ffd1dc;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    #heartlove-loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Mưa sao băng nhỏ phía nền */
    #heartlove-loading::before,
    #heartlove-loading::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255, 182, 193, .8), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(255, 215, 230, .7), transparent 60%),
        radial-gradient(2px 2px at 40% 80%, rgba(255, 105, 180, .7), transparent 60%),
        radial-gradient(1px 1px at 85% 65%, rgba(255, 255, 255, .9), transparent 60%),
        radial-gradient(1.5px 1.5px at 10% 60%, rgba(255, 192, 203, .8), transparent 60%),
        radial-gradient(2px 2px at 55% 45%, rgba(255, 240, 245, .6), transparent 60%);
      background-size: 100% 100%;
      animation: hl-stars 6s linear infinite;
      opacity: .55;
      pointer-events: none;
    }
    #heartlove-loading::after {
      animation-duration: 9s;
      animation-direction: reverse;
      opacity: .35;
      transform: scale(1.4);
    }

    @keyframes hl-stars {
      0%   { transform: translateY(0)     scale(1); opacity: .55; }
      50%  { opacity: .9; }
      100% { transform: translateY(-30px) scale(1.05); opacity: .55; }
    }

    /* Khối trái tim trung tâm — dùng emoji, không CSS shape */
    .hl-heart-stage {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 40px rgba(255, 91, 138, .65));
    }

    .hl-heart {
      font-size: 110px;
      line-height: 1;
      animation: hl-beat 1.2s cubic-bezier(.4, 0, .2, 1) infinite;
      user-select: none;
    }

    @keyframes hl-beat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.18); }
      30%      { transform: scale(.94); }
      45%      { transform: scale(1.12); }
      60%      { transform: scale(.98); }
    }

    /* Trái tim nhỏ bay lên */
    .hl-petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .hl-petals span {
      position: absolute;
      bottom: -20px;
      font-size: 18px;
      color: #ff7aa6;
      opacity: 0;
      animation: hl-float 5s linear infinite;
      filter: drop-shadow(0 0 6px rgba(255, 91, 138, .6));
    }
    .hl-petals span:nth-child(1) { left: 12%; font-size: 16px; animation-delay: 0s;   animation-duration: 5.5s; }
    .hl-petals span:nth-child(2) { left: 28%; font-size: 22px; animation-delay: .8s;  animation-duration: 4.8s; }
    .hl-petals span:nth-child(3) { left: 44%; font-size: 14px; animation-delay: 1.6s; animation-duration: 6.2s; }
    .hl-petals span:nth-child(4) { left: 60%; font-size: 20px; animation-delay: .4s;  animation-duration: 5s;   }
    .hl-petals span:nth-child(5) { left: 76%; font-size: 16px; animation-delay: 2.2s; animation-duration: 5.8s; }
    .hl-petals span:nth-child(6) { left: 88%; font-size: 18px; animation-delay: 1.2s; animation-duration: 4.5s; }

    @keyframes hl-float {
      0%   { transform: translateY(0)      rotate(0)     scale(.6); opacity: 0; }
      15%  { opacity: 1; }
      90%  { opacity: .8; }
      100% { transform: translateY(-120vh) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* Tiêu đề & dòng chữ */
    .hl-title {
      margin-top: 56px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #ffd1dc, #ff5b8a, #ffd1dc);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: hl-shine 2.4s linear infinite;
      text-align: center;
    }
    @keyframes hl-shine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .hl-subtitle {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255, 209, 220, .65);
      text-transform: uppercase;
    }

    /* Thanh tiến trình mảnh */
    .hl-bar {
      margin-top: 22px;
      width: 180px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 91, 138, .15);
      overflow: hidden;
      position: relative;
    }
    .hl-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, #ff5b8a, transparent);
      animation: hl-bar 1.4s ease-in-out infinite;
    }
    @keyframes hl-bar {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    @media (max-width: 480px) {
      .hl-heart-stage { width: 160px; height: 160px; }
      .hl-heart { font-size: 88px; }
      .hl-title { font-size: 18px; margin-top: 44px; }
      .hl-subtitle { font-size: 11px; }
    }

    @media (prefers-reduced-motion: reduce) {
      #heartlove-loading *,
      #heartlove-loading::before,
      #heartlove-loading::after { animation: none !important; }
    }
  </style>
</head>

  <!-- LOAD SETTINGS LOGIC -->
  <script>
    function initWithData(settings) {
      const music = settings.music;
      const popupMessage = settings.popupMessage;
      window._hasEnvelopeMessage = !!popupMessage;
      const messages = settings.messages;

      let noImage = false;
      let images = settings.images || settings.image;
      if (Array.isArray(images) && images.length === 0) {
        images = [];
        noImage = true;
      }
      
      const title = settings.title;
      const heartColor = settings.heartColor;

      window.dataChristmasTree = {
        template: "valentine-heart",
        data: {
          title: title,
          type_music: "link",
          music_id: music,
          backgroundMusic: music,
          popupMessage: popupMessage,
          messages: messages,
          texts: messages,
          images: images,
          heartColor: heartColor
        }
      };

      window.Heartlove = {
        data: {
          title: title,
          popupMessage: popupMessage,
          messages: messages,
          texts: messages,
          images: images,
          heartColor: heartColor,
          music: music
        }
      };

      window.dataValentine = {
        data: {
          messages: messages,
          texts: messages,
          images: images,
          captions: [],
          heartColor: heartColor,
          music: music
        }
      };

      const popupTitle = document.getElementById('popup-title');
      if (popupTitle && title) {
        popupTitle.innerHTML = title + '<span class="heart-icon">💘</span>';
      }

      const popupImage = document.getElementById('popup-image');
      if (noImage) {
        const popupImageContainer = popupImage && popupImage.closest('.popup-image-container');
        if (popupImageContainer) popupImageContainer.style.display = 'none';
        window._noImageFromApi = true;
      } else if (popupImage && images && images.length > 0) {
        popupImage.src = images[0];
      }

      console.log("Dữ liệu đã load:", window.Heartlove);
    }

    // Khởi tạo ngay lập tức với CONFIG từ config.js
    initWithData(CONFIG);
  </script>

  <!-- Chờ _heartloveReady (nếu có) trước khi khởi tạo scripts.js, sau đó ẩn loading -->
  <script type="module">
    function hideHeartloveLoading() {
      const el = document.getElementById('heartlove-loading');
      if (!el) return;
      el.classList.add('is-hidden');
      // Gỡ khỏi DOM sau khi animation fade-out hoàn tất để không chiếm tài nguyên
      setTimeout(function () { el.remove(); }, 400);
    }
    window.hideHeartloveLoading = hideHeartloveLoading;

    // Remove wait for _heartloveReady as it is synchronous now
    await import('./assets/scripts.min.js?v=202407');

    // Cho scene 3D dựng frame đầu (2 rAF) rồi ẩn overlay ngay, không cần setTimeout padding
    requestAnimationFrame(function () {
      requestAnimationFrame(hideHeartloveLoading);
    });
  </script>
