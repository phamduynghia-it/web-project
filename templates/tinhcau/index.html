        <style>
            #loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle at center,#240000 0,#0a0001 50%,#000 100%);
                z-index: 99999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: opacity .8s ease
            }

            #loading-overlay.fade-out {
                opacity: 0;
                pointer-events: none
            }

            #loading-overlay.hidden {
                display: none
            }

            #loading-overlay .loading-title {
                font-family: Pacifico,Mali,cursive;
                font-size: 42px;
                color: #ff6b8a;
                margin-bottom: 30px;
                text-shadow: 0 0 20px rgba(255,107,138,.8),0 0 40px rgba(255,107,138,.4),0 0 80px rgba(255,107,138,.2);
                animation: loadingFloat 3s ease-in-out infinite;
                padding: 0 20px;
                text-align: center;
                line-height: 1.3
            }

            #loading-overlay .loading-heart {
                font-size: 60px;
                margin-bottom: 25px;
                animation: loadingPulse 1.5s ease-in-out infinite
            }

            #loading-overlay .loading-text {
                font-size: 14px;
                color: rgba(255,255,255,.8);
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-bottom: 20px;
                font-family: Mali,sans-serif
            }

            #loading-overlay .loading-bar {
                width: 200px;
                height: 3px;
                background: rgba(255,255,255,.1);
                border-radius: 3px;
                overflow: hidden
            }

            #loading-overlay .loading-progress {
                width: 0%;
                height: 100%;
                background: linear-gradient(90deg,#ff6b8a,#ff8fab);
                border-radius: 3px;
                transition: width .3s ease
            }

            #loading-overlay .loading-percent {
                margin-top: 15px;
                font-size: 12px;
                color: rgba(255,255,255,.6);
                letter-spacing: 2px;
                font-family: Mali,sans-serif
            }

            @keyframes loadingFloat {
                0%,100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-5px)
                }
            }

            @keyframes loadingPulse {
                0%,100% {
                    transform: scale(1)
                }

                50% {
                    transform: scale(1.2)
                }
            }

            @media (max-width: 768px) {
                #loading-overlay .loading-title {
                    font-size:28px;
                    padding: 0 25px
                }

                #loading-overlay .loading-heart {
                    font-size: 50px
                }

                #loading-overlay .loading-text {
                    font-size: 12px;

                }
            }

            @media (max-width: 480px) {

                #loading-overlay .loading-heart {
                    font-size: 40px
                }
            }

            .shooting-stars {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
                pointer-events: none
            }

            @keyframes shooting-star-opacity {
                0% {
                    opacity: 0
                }

                40% {
                    opacity: 1
                }

                60% {
                    opacity: 1
                }

                100% {
                    opacity: 0
                }
            }

            @keyframes shooting-star-pos {
                0% {
                    transform: scale(0) rotate(0) translate3d(0,0,0)
                }

                100% {
                    transform: scale(1) rotate(0) translate3d(-450px,450px,0)
                }
            }

            .shooting-star {
                display: block;
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: #fff;
                position: absolute;
                transform-origin: 100% 0;
                animation: shooting-star-opacity 6s infinite ease-in,shooting-star-pos 6s infinite ease-in;
                box-shadow: 0 0 8px 3px rgba(255,255,255,.4);
                opacity: 0
            }

            .shooting-star:after {
                content: '';
                display: block;
                position: absolute;
                top: 0;
                left: 3px;
                border: 0 solid #fff;
                border-width: 0 80px 1.5px;
                border-color: transparent transparent transparent rgba(255,255,255,.4);
                transform: rotate(-45deg) translate3d(1px,2px,0);
                box-shadow: 0 0 2px 0 rgba(255,255,255,.2);
                transform-origin: 0% 100%
            }

            #text-container {
                position: absolute;

                left: 0;

            }

            .floating-text {
                position: absolute;
                transform: translate(-50%,-50%) scale(1);
                transition: transform .2s cubic-bezier(.175, .885, .32, 1.27),opacity .3s;
                font-weight: 500;
                font-size: 14px;
                color: #fff;
                width: 300px;
                text-shadow: 0 0 8px rgba(255,255,255,.8);
                will-change: transform,opacity;
                pointer-events: auto;
                cursor: grab;
                touch-action: none;
                user-select: none;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                padding: 5px 10px;
                border-radius: 5px;
                box-sizing: border-box;
                max-width: 80vw
            }

            .floating-image {
                position: absolute;
                width: 35px;
                height: 35px;
                object-fit: cover;
                background: 0 0;
                box-shadow: none;
                border: none;
                pointer-events: auto;
                cursor: grab;
                border-radius: 5px;
                transform: translate(-50%,-50%) scale(1);
                transition: transform .2s cubic-bezier(.175, .885, .32, 1.27),opacity .3s;
                user-select: none;
                will-change: transform,opacity;
                -webkit-user-drag: none;
                touch-action: none
            }

            .tap-hint {
                position: fixed;
                bottom: 25%;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                pointer-events: none;
                opacity: 0;
                animation: fadeInHint 1s ease-out 4s forwards
            }

            .tap-hint-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px
            }

            .tap-hint-icon {
                width: 50px;
                height: 50px;
                border: 2px solid rgba(255,255,255,.6);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: tapPulse 1.5s ease-in-out infinite;
                background: rgba(255,105,180,.2);
                backdrop-filter: blur(5px)
            }

            .tap-hint-icon::before {
                content: '';
                width: 12px;
                height: 12px;
                background: rgba(255,255,255,.9);
                border-radius: 50%
            }

            .tap-hint-text {
                font-family: Mali,sans-serif;
                font-size: 16px;
                color: rgba(255,255,255,.9);
                text-shadow: 0 2px 10px rgba(0,0,0,.5);
                animation: textGlow 2s ease-in-out infinite
            }

            .tap-hint-arrow {
                font-size: 24px;
                color: rgba(255,255,255,.8);
                animation: bounceArrow 1s ease-in-out infinite
            }

            @keyframes fadeInHint {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(20px)
                }

                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0)
                }
            }

            @keyframes tapPulse {
                0%,100% {
                    transform: scale(1);
                    box-shadow: 0 0 20px rgba(255,105,180,.4)
                }

                50% {
                    transform: scale(1.15);
                    box-shadow: 0 0 30px rgba(255,105,180,.7)
                }
            }

            @keyframes textGlow {
                0%,100% {
                    text-shadow: 0 2px 10px rgba(255,105,180,.3)
                }

                50% {
                    text-shadow: 0 2px 20px rgba(255,105,180,.8)
                }
            }

            @keyframes bounceArrow {
                0%,100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-8px)
                }
            }

            .tap-hint.hidden {
                animation: fadeOutHint .5s ease-out forwards
            }

            @keyframes fadeOutHint {
                from {
                    opacity: 1
                }

                to {
                    opacity: 0;
                    visibility: hidden
                }
            }

            @media screen and (max-width: 768px) {

            #envelope-overlay {
                position: fixed;
                inset: 0;
                z-index: 519;
                background: 0 0;
                pointer-events: none
            }

            #envelope-overlay.show {
                pointer-events: auto
            }

            #envelope-img {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%,-50%) scale(0);
                width: clamp(140px,35vw,250px);
                z-index: 520;
                cursor: pointer;
                opacity: 0;
                pointer-events: none;
                filter: drop-shadow(0 0 30px rgba(255, 105, 180, .6)) drop-shadow(0 0 60px rgba(255, 20, 147, .3));
                -webkit-user-drag: none;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
                transition: filter .3s ease
            }

            #envelope-img.show {
                opacity: 1;
                pointer-events: auto;
                animation: envelopeAppear .8s cubic-bezier(.34,1.56,.64,1) forwards
            }

            #envelope-img.show:hover {
                filter: drop-shadow(0 0 40px rgba(255, 105, 180, .9)) drop-shadow(0 0 80px rgba(255, 20, 147, .5))
            }

            #envelope-img.open {
                animation: envelopeOpen .6s ease-in forwards;
                pointer-events: none
            }

            @keyframes envelopeAppear {
                0% {
                    transform: translate(-50%,-50%) scale(0) rotate(-15deg);
                    opacity: 0
                }

                60% {
                    transform: translate(-50%,-50%) scale(1.1) rotate(3deg);
                    opacity: 1
                }

                100% {
                    transform: translate(-50%,-50%) scale(1) rotate(0);
                    opacity: 1
                }
            }

            @keyframes envelopeOpen {
                0% {
                    transform: translate(-50%,-50%) scale(1);
                    opacity: 1
                }

                50% {
                    transform: translate(-50%,-50%) scale(1.2) rotate(5deg);
                    opacity: .8
                }

                100% {
                    transform: translate(-50%,-50%) scale(.3) rotate(-10deg);
                    opacity: 0
                }
            }
