<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>__TITLE__</title>
        <link
            href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <!-- Hearts Container -->
            <div class="hearts-container" id="heartsContainer">
                <!-- Hearts will be generated by JavaScript -->
            </div>

            <!-- Mailbox -->
            <div class="mailbox-wrapper" id="mailboxWrapper">
                <div class="mailbox" id="mailbox">
                    <img
                        src="images/close.png"
                        alt="closed mailbox"
                        class="mailbox-img closed"
                        id="closedMailbox"
                    />
                    <img
                        src="images/hopopen.png"
                        alt="open mailbox"
                        class="mailbox-img open"
                        id="openMailbox"
                    />
                </div>
            </div>

            <!-- Letter content -->
            <div class="letter" id="letter">
                <div class="love-image">
                    <img src="__BACKGROUND_IMG__" alt="love image" /> 
                </div>
                <div class="corner-hearts">
                    <span class="heart tl">❤</span>
                    <span class="heart tr">❤</span>
                    <span class="heart bl">❤</span>
                    <span class="heart br">❤</span>
                </div>
                <div class="message" id="messageBox" style="font-size: __FONT_SIZE__px; white-space: pre-wrap;">__MESSAGE__</div>
            </div>
        </div>

        <!-- Audio element -->
        <audio id="backgroundMusic" loop>
            <source src="__BG_MUSIC__" type="audio/mpeg" />
            Your browser does not support the audio element.
        </audio>

        <script src="script.js"></script>
    	<!-- Cơ chế bảo mật (Chống soi code) -->
	<script src="./anti-devtools.js"></script>
</body>
</html>
